cache_path: proto_modules

deps:
  - github.com/googleapis/googleapis
  - go.redsock.ru/protoc-gen-npm@v0.0.17

generate:
  proto_root: api/grpc
  inputs:
    - directory: "api/grpc"
  plugins:
    - name: go
      out: pkg/api
      opts:
        paths: source_relative
    - name: go-grpc
      out: pkg/api
      opts:
        paths: source_relative
    - name: grpc-gateway
      out: pkg/api
      opts:
        paths: source_relative

    - name: grpc-gateway-ts
      out: pkg/web/@vervstack/matreshka

    - name: openapiv2
      out: pkg/docs/swaggers

    - name: docs
      out: pkg/docs

    - name: npm
      out: pkg/web