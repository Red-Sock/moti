cache_path: proto_modules

deps:
  - github.com/googleapis/googleapis

generate:
#  proto_root: api/grpc
  inputs:
    - directory: "api/grpc"
  plugins:
    - name: go
      out: pkg/api
      opts:
        paths: source_relative
    - name: go-grpc
      out: pkg/api
      opts:
        paths: source_relative
