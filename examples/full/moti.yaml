cache_path: proto_modules

deps:
  #  Deps - is an external git repository to download to cache
  #  The version can be omited (then the last commit will be fetched)
  - github.com/googleapis/googleapis
  #  Or be specified to the exact tag (or commit hash)
  - go.redsock.ru/protoc-gen-npm@v0.0.17
  #  Also, you can specify git repositories with client's to generate
  #  using tag
  - github.com/vervstack/Matreshka@v1.0.95
  #  or commit hash
  - github.com/vervstack/Velez@220e0db758f9ce96d9b1f457234616284530622b
#  And use it in codegen below

# This section is responsible for maintaining project binaries version same
#  across different developer environments
binaries:
#  In case you want to specify a local directory to hold all binaries
#     useful for different versions in different projects
#     empty by default and use global folders (e.g. `GO_BIN` for `go install `)
#  if not empty plugins during generation will be using a full path to this directory
#     e.g.
#           You have `protoc-gen-go-grpc` installed globally
#       and
#           `protoc-gen-go` installed in the `bin` folder inside the repository
#  moti will use global bin located at $GO_BIN for protoc-gen-go-grpc
#     and local bin for protoc-gen-go at `bin` folder
# this is achieved via setting bin_dir in PATH before global PATH variable
  bin_dir: "bin"
# By default, only plugins with `protoc-gen-` prefix are allowed to be installed.
#  settings allow_custom to true - allow you to install any binary
  allow_custom: true
  install:
    - go:
#        module that will be installed with `go install` with a specific version
#        or with the latest if no version is passed
        module: google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
#        validation argument to verify version
#        Basically calls `protoc-gen-go --version` and checks that the output string contains a version substring
#             (in this case it's v1.36.11)
#        if empty - checks that binary is installed without checking version
        version_check_args: --version

generate:
  #  Server generation looks like this.
  #  It is better to separate local proto file gen from external
  #  to avoid file mess
  #
  #  inputs - defines what proto files should be included in generation using -I flag
  #           it can be specific local files defined via "directory"
  #      or
  #           it can be external git repositories, examples for them, you can find in the input object for client gen
  #  Each input becomes a separate protoc command
  - inputs:
      #      This server gen points to the directory with proto contracts
      #      if empty or equals to "." (current directory)
      #         will walk through the whole repository (excluding cache_path since it contains a lot of external proto)
      - directory: "api/grpc"
    #    plugins section - defines what "protoc-gen-*" plugins should be used to generate final proto
    plugins:
      #      protoc-gen- part is omitted to save space
      #      since plugins for proto must be named with protoc-gen- :)
      #      protoc-gen-go -> go
      #      protoc-gen-go-grpc -> go-grpc
      #      protoc-gen-go-temporal -> go-temporal
      #      and etc.
      - name: go
        #        place where generated .go files should be placed
        out: internal/api/server
        #        standard plugins options
        opts:
          #          source_relative - allows you to generate files ignoring a full package path from a go_package option
          #          it can be useful in case when go_package has a long import path (like in this case in basic_service.proto)
          paths: source_relative
      - name: go-grpc
        out: internal/api/server
        opts:
          paths: source_relative

      - name: grpc-gateway
        out: internal/api/server
        opts:
          paths: source_relative
      # Moti also supports all type of protoc-gen- binaries even a custom one like this
      #      protoc-gen-grpc-gateway-ts
      - name: grpc-gateway-ts
        out: internal/pkg/web/@moti/basic_example

  #  Clients gen
  #  Same as for server but now using external repos.
  - inputs:
      - git_repo:
          url: github.com/vervstack/Matreshka
          #          You can specify the exact subdirectory to use as root for generating
          sub_directory: api/grpc
      - git_repo:
          #          or not specify - then the root of the input repository will be used
          url: github.com/vervstack/Velez
    plugins:
      - name: go
        out: internal/api/clients
        opts:
          # If a package contains some specific path
          #          (like this generated section includes only go.vervstack.ru packages)
          #   you can specify module to omit when generated
          #   All generated packages will remove substring "go.vervstack.ru" from the beggining
          module: go.vervstack.ru
      - name: go-grpc
        out: internal/api/clients
        opts:
          module: go.vervstack.ru