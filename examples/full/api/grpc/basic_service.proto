syntax = "proto3";

package basic_example_api;

// This is an antipattern. Package name should be generic in case somebody will import
// this proto and generate .go files for himself.
// A better naming is "/basic_example_api;basic_example_api"
option go_package = "go.redsock.ru/moti/examples/basic_example_api;basic_example_api";

import "google/api/annotations.proto";
import "messages.proto";

service BasicExampleApi {
  rpc Hello(Hello.Request) returns (Hello.Response) {
    option (google.api.http) = {
      get: "/api/hello"
    };
  }
}
