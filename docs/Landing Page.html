<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width:100%; min-height:100%; background:#0c0c0f; color:#e8e8f0; font-family:'Comfortaa', sans-serif; }
  #root { width:100%; min-height:100vh; }
  ::selection { background: rgba(179,136,255,0.35); color:#fff; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes flowDash { to { stroke-dashoffset: -40; } }
  @keyframes flowDashRev { to { stroke-dashoffset: 40; } }
  @keyframes pulseRing { 0%,100% { transform:scale(1); opacity:.55; } 50% { transform:scale(1.06); opacity:.85; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes chipDrift { 0% { transform:translateX(0); opacity:0; } 8% { opacity:1; } 92% { opacity:1; } 100% { transform:translateX(var(--dx,140px)); opacity:0; } }
  @keyframes orbit { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  .scroll-link { color:#b388ff; text-decoration:none; border-bottom:1px solid rgba(179,136,255,0.35); transition:border-color .15s; }
  .scroll-link:hover { border-bottom-color:#b388ff; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─── Brand tokens (moti = VervStack sibling, purple accent) ───────────
const T = {
  bg:        '#0c0c0f',
  bg2:       '#13131a',
  bg3:       '#1c1c26',
  bg4:       '#23232f',
  border:    'rgba(179,136,255,0.16)',
  borderM:   'rgba(179,136,255,0.32)',
  borderS:   'rgba(255,255,255,0.06)',
  purple:    '#b388ff',
  purpleDp:  '#8b5cff',
  purpleDim: 'rgba(179,136,255,0.10)',
  red:       '#ed2f32',
  cyan:      '#0ab7ee',
  green:     '#7adfaa',
  fg:        '#e8e8f0',
  fgMid:     '#b0b0c8',
  fgDim:     '#72728a',
  fgDeep:    '#4a4a5c',
  mono:      "'JetBrains Mono', monospace",
  sans:      "'Comfortaa', sans-serif",
};

// ─── Moti logo: stacked hex contract being forked into outputs ────────
function MotiMark({ size = 32 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="motiG1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stopColor="#d3b8ff"/>
          <stop offset="1" stopColor="#7a4dff"/>
        </linearGradient>
        <linearGradient id="motiG2" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stopColor="#b388ff" stopOpacity=".95"/>
          <stop offset="1" stopColor="#5b2db8" stopOpacity=".7"/>
        </linearGradient>
      </defs>
      {/* outer hex contract */}
      <path d="M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z"
            fill="none" stroke="url(#motiG1)" strokeWidth="3.2" strokeLinejoin="round"/>
      {/* inner hex — generated payload */}
      <path d="M32 18 L46 26 L46 42 L32 50 L18 42 L18 26 Z"
            fill="url(#motiG2)" opacity="0.95"/>
      {/* fork arrow / split */}
      <path d="M32 28 L32 40 M32 40 L26 36 M32 40 L38 36"
            stroke="#0c0c0f" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// ─── Nav ───────────────────────────────────────────────────────────────
function Nav() {
  const links = [
    { l:'Features',   href:'#features' },
    { l:'Pipeline',   href:'#pipeline' },
    { l:'Config',     href:'#config'   },
    { l:'Docs',       href:'Moti Docs.html', primary:true },
    { l:'GitHub',     href:'#'         },
  ];
  return (
    <nav style={{
      display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'0 56px', height:64,
      borderBottom:`1px solid ${T.border}`,
      background:'rgba(12,12,15,0.88)',
      backdropFilter:'blur(14px)',
      WebkitBackdropFilter:'blur(14px)',
      position:'sticky', top:0, zIndex:30,
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:11 }}>
        <MotiMark size={28}/>
        <span style={{ fontWeight:700, fontSize:17, letterSpacing:'-0.02em', color:T.fg }}>
          moti
          <span style={{ color:T.fgDim, fontWeight:400, marginLeft:8, fontSize:13.5 }}>
            <span style={{ color:T.fgDeep }}>·</span> a redsock tool
          </span>
        </span>
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:30, fontSize:13.5 }}>
        {links.map(({l, href, primary}) => (
          <a key={l} href={href}
             style={{
               color: primary ? T.purple : T.fgDim,
               textDecoration:'none',
               fontWeight: primary ? 600 : 400,
               transition:'color 0.15s',
             }}
             onMouseEnter={e => { if(!primary) e.target.style.color = T.fg; }}
             onMouseLeave={e => { if(!primary) e.target.style.color = T.fgDim; }}>
            {l}
            {primary && <span style={{ marginLeft:5, fontFamily:T.mono, fontSize:11, opacity:.6 }}>↗</span>}
          </a>
        ))}
      </div>
      <a href="Moti Docs.html#quickstart" style={{ textDecoration:'none' }}>
        <button style={{
          background: T.purple, border:'none', borderRadius:8,
          color:'#0c0c0f', fontFamily:T.sans, fontWeight:700, fontSize:13,
          padding:'9px 20px', cursor:'pointer', letterSpacing:'-0.005em',
        }}>Quickstart →</button>
      </a>
    </nav>
  );
}

// ─── Pipeline visual: animated proto → moti → langs ───────────────────
function PipelineHero() {
  const protos = [
    { name:'user.proto',     y:0,   delay:0    },
    { name:'orders.proto',   y:54,  delay:1.6  },
    { name:'billing.proto',  y:108, delay:3.2  },
    { name:'swagger.yaml',   y:162, delay:0.8, kind:'yaml' },
    { name:'gateway.proto',  y:216, delay:2.4  },
  ];
  const langs = [
    { name:'Go',         color:'#00add8', y:0   },
    { name:'TypeScript', color:'#3178c6', y:46  },
    { name:'Python',     color:'#ffd43b', y:92  },
    { name:'Rust',       color:'#dea584', y:138 },
    { name:'Java',       color:'#f89820', y:184 },
    { name:'C#',         color:'#9b4f96', y:230 },
  ];

  return (
    <div style={{
      position:'relative', width:'100%', height:380,
      borderRadius:14,
      background:`linear-gradient(180deg, ${T.bg2} 0%, ${T.bg} 100%)`,
      border:`1px solid ${T.border}`,
      overflow:'hidden',

      {/* faint grid */}
      <svg width="100%" height="100%" style={{ position:'absolute', inset:0, opacity:0.4 }}>
        <defs>
          <pattern id="motiGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M40 0 L0 0 0 40" fill="none" stroke={T.borderS} strokeWidth="1"/>
          </pattern>
          <radialGradient id="motiGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0" stopColor={T.purple} stopOpacity="0.28"/>
            <stop offset="1" stopColor={T.purple} stopOpacity="0"/>
          </radialGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#motiGrid)"/>
        <circle cx="50%" cy="50%" r="200" fill="url(#motiGlow)"/>
      </svg>

      {/* lanes */}
      <svg viewBox="0 0 1000 380" preserveAspectRatio="xMidYMid meet"
           style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
        {/* Left -> hub */}
        {protos.map((p, i) => {
          const y = 60 + i*54;
          return (
            <path key={'in'+i}
              d={`M 230 ${y} C 340 ${y}, 420 190, 480 190`}
              fill="none" stroke={T.purple} strokeOpacity="0.35" strokeWidth="1.3"
              strokeDasharray="4 6"
              style={{ animation:`flowDash 1.8s linear infinite`, animationDelay:`${i*0.18}s` }}/>
          );
        })}
        {/* hub -> right */}
        {langs.map((l, i) => {
          const y = 80 + i*38;
          return (
            <path key={'out'+i}
              d={`M 520 190 C 580 190, 660 ${y}, 770 ${y}`}
              fill="none" stroke={T.purple} strokeOpacity="0.45" strokeWidth="1.3"
              strokeDasharray="4 6"
              style={{ animation:`flowDash 1.5s linear infinite`, animationDelay:`${i*0.12}s` }}/>
          );
        })}

        {/* hub ring */}
        <g transform="translate(500 190)">
          <circle r="62" fill="none" stroke={T.purple} strokeOpacity="0.18" strokeWidth="1"
                  style={{ transformOrigin:'center', animation:'orbit 18s linear infinite' }}
                  strokeDasharray="3 8"/>
          <circle r="48" fill="none" stroke={T.purple} strokeOpacity="0.28" strokeWidth="1.2"/>
          <circle r="38" fill={T.bg2} stroke={T.purple} strokeOpacity="0.7" strokeWidth="1.5"
                  style={{ animation:'pulseRing 3.4s ease-in-out infinite', transformOrigin:'center' }}/>
        </g>
      </svg>

      {/* hub label (HTML, overlaid) */}
      <div style={{
        position:'absolute', left:'50%', top:'50%', transform:'translate(-50%,-50%)',
        display:'flex', flexDirection:'column', alignItems:'center', gap:4, zIndex:3,
      }}>
        <MotiMark size={36}/>
        <div style={{ fontFamily:T.mono, fontSize:11, color:T.purple, letterSpacing:'0.14em', textTransform:'uppercase' }}>moti</div>
      </div>

      {/* Inputs (left column) */}
      <div style={{ position:'absolute', left:32, top:42, display:'flex', flexDirection:'column', gap:14, zIndex:2 }}>
        {protos.map((p, i) => (
          <div key={p.name}
            style={{
              display:'flex', alignItems:'center', gap:9,
              padding:'7px 11px',
              background:T.bg3,
              border:`1px solid ${T.border}`,
              borderRadius:7,
              fontFamily:T.mono, fontSize:11.5, color:T.fg,
              minWidth:148,
              animation:`fadeUp 0.5s ease-out ${i*0.08}s both`,
            }}>
            <span style={{
              fontFamily:T.mono, fontSize:9, fontWeight:600,
              color: p.kind === 'yaml' ? '#ffd43b' : T.purple,
              border:`1px solid ${p.kind === 'yaml' ? '#ffd43b55' : T.borderM}`,
              padding:'1px 5px', borderRadius:3, letterSpacing:'0.04em',
            }}>{p.kind === 'yaml' ? 'YAML' : 'PROTO'}</span>
            <span>{p.name}</span>
          </div>
        ))}
        <div style={{ fontFamily:T.mono, fontSize:10, color:T.fgDeep, letterSpacing:'0.1em', textTransform:'uppercase', marginTop:6, paddingLeft:2 }}>
          ◂ contracts
        </div>
      </div>

      {/* Outputs (right column) */}
      <div style={{ position:'absolute', right:32, top:62, display:'flex', flexDirection:'column', gap:8, zIndex:2 }}>
        {langs.map((l, i) => (
          <div key={l.name}
            style={{
              display:'flex', alignItems:'center', gap:9,
              padding:'6px 12px 6px 10px',
              background:T.bg3,
              border:`1px solid ${T.border}`,
              borderRadius:7,
              fontFamily:T.mono, fontSize:11.5, color:T.fg,
              minWidth:132,
              animation:`fadeUp 0.5s ease-out ${0.4 + i*0.07}s both`,
            }}>
            <span style={{ width:8, height:8, borderRadius:'50%', background:l.color, flexShrink:0 }}></span>
            <span>{l.name}</span>
            <span style={{ marginLeft:'auto', fontSize:10, color:T.fgDim }}>.gen</span>
          </div>
        ))}
        <div style={{ fontFamily:T.mono, fontSize:10, color:T.fgDeep, letterSpacing:'0.1em', textTransform:'uppercase', marginTop:6, paddingRight:2, textAlign:'right' }}>
          generated ▸
        </div>
      </div>

      {/* corner meta */}
      <div style={{
        position:'absolute', bottom:14, left:18,
        fontFamily:T.mono, fontSize:10.5, color:T.fgDim, letterSpacing:'0.06em',
        display:'flex', gap:14,
      }}>
        <span><span style={{ color:T.purple }}>git pull</span> → fetch contracts</span>
        <span style={{ color:T.fgDeep }}>·</span>
        <span><span style={{ color:T.purple }}>protoc</span> → generate</span>
        <span style={{ color:T.fgDeep }}>·</span>
        <span><span style={{ color:T.purple }}>moti</span> → orchestrate</span>
      </div>
      <div style={{
        position:'absolute', bottom:14, right:18,
        fontFamily:T.mono, fontSize:10.5, color:T.fgDim,
      }}>
        <span style={{ display:'inline-block', width:7, height:7, borderRadius:'50%', background:T.green, marginRight:6, verticalAlign:'middle' }}></span>
        live
      </div>
    </div>
  );
}

// ─── Hero block ────────────────────────────────────────────────────────

  return (

      <div style={{
        display:'inline-flex', alignItems:'center', gap:8,
        background:T.purpleDim, border:`1px solid ${T.borderM}`,
        borderRadius:20, padding:'4px 14px', marginBottom:24,
        fontFamily:T.mono, fontSize:11.5, color:T.purple, letterSpacing:'0.02em',
      }}>
        <span style={{ width:6, height:6, borderRadius:'50%', background:T.purple, display:'inline-block' }}></span>
        proto contracts · grpc · openapi
      </div>

      <h1 style={{
        fontSize:64, fontWeight:700, lineHeight:1.05,
        letterSpacing:'-0.035em', color:T.fg,
        textWrap:'balance', marginBottom:24, maxWidth:920,
      }}>

        <span style={{

      <div style={{ display:'flex', gap:12, alignItems:'center', flexWrap:'wrap', marginBottom:24 }}>

              marginLeft:8, background:'transparent', border:`1px solid ${T.border}`,

            }}>copy</button>
        </div>
        <a href="Moti Docs.html#quickstart" style={{ textDecoration:'none' }}>
          <button style={{
            background:T.purple, border:'none', borderRadius:9,

            padding:'13px 24px', cursor:'pointer',
          }}>Read the docs →</button>

      <div style={{ fontFamily:T.mono, fontSize:11.5, color:T.fgDim, marginBottom:54, display:'flex', gap:18, flexWrap:'wrap' }}>

        <span><span style={{ color:T.green }}>✓</span> Multi-plugin codegen</span>
        <span><span style={{ color:T.green }}>✓</span> Git-based contract registry</span>
        <span><span style={{ color:T.green }}>✓</span> Installs protoc & plugins for you</span>

      <div id="pipeline">

// ─── Features ──────────────────────────────────────────────────────────

      title:'Wraps protoc, sanely',
      body:'No more 14-flag invocations. moti reads a tiny config and runs protoc with the right plugins, paths, and includes — every time.',

    {
      sym:'⊕',
      title:'Pulls contracts from git',
      body:'Reference proto/swagger files in any repo by URL + ref. moti fetches, caches, and version-pins them like a package manager.',

    {
      sym:'◎',
      title:'Multi-plugin output',
      body:'Generate gRPC + HTTP gateway + OpenAPI + validators + your own protoc plugin — all in one pass, all configured per target.',
    },
    {
      sym:'⊞',
      title:'Auto-installs binaries',
      body:'Don\u2019t have protoc, protoc-gen-go, or your plugin of choice? moti detects, downloads, and pins the right versions for you.',

  return (

      <h2 style={{ fontSize:38, fontWeight:700, letterSpacing:'-0.025em', marginBottom:48, color:T.fg, maxWidth:720, textWrap:'balance' }}>

      </h2>
      <div style={{

        {features.map((f, i) => (
          <div key={i}

            <div style={{

// ─── Config example ────────────────────────────────────────────────────
let _tokId = 0;
function tok(text, color) { return <span key={_tokId++} style={{ color }}>{text}</span>; }
function ConfigShowcase() {
  const lines = [
    [tok('# moti.yaml — single source of truth', T.fgDeep)],
    [],
    [tok('version', T.purple), tok(': ', T.fgMid), tok('1', T.green)],
    [],
    [tok('contracts', T.purple), tok(':', T.fgMid)],
    [tok('  - ', T.fgDim), tok('name', T.cyan), tok(': ', T.fgMid), tok('orders', T.fg)],
    [tok('    ', T.fgDim), tok('git', T.cyan), tok(':   ', T.fgMid), tok('github.com/acme/contracts', T.fg)],
    [tok('    ', T.fgDim), tok('ref', T.cyan), tok(':   ', T.fgMid), tok('v1.4.0', T.green)],
    [tok('    ', T.fgDim), tok('path', T.cyan), tok(':  ', T.fgMid), tok('proto/orders', T.fg)],
    [tok('  - ', T.fgDim), tok('name', T.cyan), tok(': ', T.fgMid), tok('billing', T.fg)],
    [tok('    ', T.fgDim), tok('git', T.cyan), tok(':   ', T.fgMid), tok('git.redsock.ru/billing-api', T.fg)],
    [tok('    ', T.fgDim), tok('ref', T.cyan), tok(':   ', T.fgMid), tok('main', T.green)],
    [],
    [tok('targets', T.purple), tok(':', T.fgMid)],
    [tok('  go', T.cyan), tok(':', T.fgMid)],
    [tok('    ', T.fgDim), tok('plugins', T.cyan), tok(': ', T.fgMid), tok('[protoc-gen-go, protoc-gen-go-grpc]', T.fg)],
    [tok('    ', T.fgDim), tok('out', T.cyan), tok(':     ', T.fgMid), tok('./internal/pb', T.fg)],
    [tok('  ts', T.cyan), tok(':', T.fgMid)],
    [tok('    ', T.fgDim), tok('plugins', T.cyan), tok(': ', T.fgMid), tok('[protoc-gen-ts, protoc-gen-grpc-web]', T.fg)],
    [tok('    ', T.fgDim), tok('out', T.cyan), tok(':     ', T.fgMid), tok('./web/src/pb', T.fg)],
    [tok('  openapi', T.cyan), tok(':', T.fgMid)],
    [tok('    ', T.fgDim), tok('plugins', T.cyan), tok(': ', T.fgMid), tok('[protoc-gen-openapiv2]', T.fg)],
    [tok('    ', T.fgDim), tok('out', T.cyan), tok(':     ', T.fgMid), tok('./docs/openapi', T.fg)],
  ];

}/*EDITMODE-END*/;

const tStyle = `

  .twk-switch.on .twk-knob{transform:translateX(14px)}
`;

const ACCENT_OPTIONS = {
  purple: { c:'#b388ff', dp:'#8b5cff' },
  cyan:   { c:'#0ab7ee', dp:'#0888b8' },
  green:  { c:'#7adfaa', dp:'#3eb37a' },
  amber:  { c:'#f6c34a', dp:'#cc9020' },
};

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [open, setOpen] = useState(false);

  const setTweak = useCallback((k, v) => {
    setTweaks(prev => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [k]:v } }, '*');
      return next;
    });
  }, []);

  useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Live-update accent CSS variables on root inline style
  useEffect(() => {
    const opt = ACCENT_OPTIONS[tweaks.accent] || ACCENT_OPTIONS.purple;
    T.purple = opt.c;
    T.purpleDp = opt.dp;
    T.purpleDim = opt.c.startsWith('#') ? `${opt.c}1a` : opt.c;
    T.border = `${opt.c}29`;
    T.borderM = `${opt.c}52`;
    // Force re-render by setting a dummy state — simpler: bump a counter
    setBump(b => b+1);
  }, [tweaks.accent]);

  const [bump, setBump] = useState(0);

  return (
    <>
      <Nav/>
      <Hero/>
      <Features/>
      <ConfigShowcase/>
      <Registry/>
      <Footer/>

      {open && (
        <>
          <style>{tStyle}</style>
          <div className="twk-panel">
            <div className="twk-hd">
              <b>Tweaks</b>
              <button className="twk-x" onClick={() => { setOpen(false); window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); }}>✕</button>
            </div>
            <div className="twk-body">
              <div>
                <div className="twk-lbl">Accent color</div>
                <div className="twk-swatches">
                  {Object.entries(ACCENT_OPTIONS).map(([k, v]) => (
                    <div key={k}
                      className={`twk-sw ${tweaks.accent === k ? 'active' : ''}`}
                      style={{ background:v.c }}
                      onClick={() => setTweak('accent', k)}/>
                  ))}
                </div>
              </div>
              <div className="twk-tog">
                <span style={{ fontSize:12 }}>Show install banner</span>
                <div className={`twk-switch ${tweaks.showInstallBanner ? 'on' : ''}`}
                  onClick={() => setTweak('showInstallBanner', !tweaks.showInstallBanner)}>
                  <div className="twk-knob"></div>
                </div>
              </div>
              <div style={{ fontSize:10.5, color:'#72728a', fontFamily:"'JetBrains Mono',monospace", paddingTop:6, borderTop:'1px solid rgba(255,255,255,0.06)' }}>
                moti.redsock.ru · sibling of VervStack
              </div>
            </div>
          </div>
        </>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
